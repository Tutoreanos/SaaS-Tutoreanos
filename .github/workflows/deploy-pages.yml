name: Publicar CRM no GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v5

      - name: Instalar dependências
        run: npm ci

      - name: Gerar versão estática
        run: npm run pages:build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_BASE_PATH: /SaaS-Tutoreanos
          NEXT_PUBLIC_SUPABASE_URL: https://lytngvxjclycnqiombki.supabase.co
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_FRC_Ms5LI-8OxUJpS9gMWw_O3MgZXTe

      - name: Desabilitar processamento Jekyll
        run: touch out/.nojekyll

      - name: Preparar artefato do Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
